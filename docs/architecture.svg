<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Consolas, monospace" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="900" height="700" fill="url(#bg)" rx="8"/>
  <!-- grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="700" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#22d3ee" font-size="18" font-weight="bold" text-anchor="middle">ReconProbe — Architecture &amp; Data Flow</text>
  <line x1="150" y1="45" x2="750" y2="45" stroke="#334155" stroke-width="1"/>
  <text x="450" y="60" fill="#94a3b8" font-size="11" text-anchor="middle">Subdomain Discovery · Port Scanning · Service Enumeration</text>

  <!-- Phase boxes -->
  <rect x="50" y="85" width="240" height="45" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="170" y="105" fill="#22d3ee" font-size="13" font-weight="bold" text-anchor="middle">Phase 1: Passive Recon</text>
  <text x="170" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">crt.sh Certificate Transparency</text>
  
  <rect x="330" y="85" width="240" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="105" fill="#34d399" font-size="13" font-weight="bold" text-anchor="middle">Phase 2: DNS Brute-force</text>
  <text x="450" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">ThreadPool Resolver</text>
  
  <rect x="610" y="85" width="240" height="45" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="730" y="105" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">Phase 3: Port Scan</text>
  <text x="730" y="120" fill="#94a3b8" font-size="10" text-anchor="middle">TCP connect + Banner Grab</text>

  <!-- Phase 1 detailed -->
  <rect x="50" y="160" width="240" height="180" rx="6" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="170" y="180" fill="#22d3ee" font-size="11" font-weight="bold" text-anchor="middle">Phase 1 Details</text>
  
  <rect x="65" y="195" width="210" height="35" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="170" y="210" fill="#e2e8f0" font-size="11" text-anchor="middle">query_crtsh(domain)</text>
  <text x="170" y="222" fill="#94a3b8" font-size="9" text-anchor="middle">GET ?q=%.domain.com</text>
  
  <line x1="170" y1="232" x2="170" y2="250" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="65" y="250" width="210" height="35" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="170" y="265" fill="#e2e8f0" font-size="11" text-anchor="middle">resolve_host(s)</text>
  <text x="170" y="277" fill="#94a3b8" font-size="9" text-anchor="middle">socket.gethostbyname()</text>
  
  <line x1="170" y1="287" x2="170" y2="305" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="65" y="305" width="210" height="25" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="170" y="321" fill="#22d3ee" font-size="10" text-anchor="middle">Subdomain Set A</text>

  <!-- Phase 2 detailed -->
  <rect x="330" y="160" width="240" height="180" rx="6" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="180" fill="#34d399" font-size="11" font-weight="bold" text-anchor="middle">Phase 2 Details</text>
  
  <rect x="345" y="195" width="210" height="35" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="450" y="210" fill="#e2e8f0" font-size="11" text-anchor="middle">dns_bruteforce()</text>
  <text x="450" y="222" fill="#94a3b8" font-size="9" text-anchor="middle">Wordlist × Domain Candidate</text>
  
  <line x1="450" y1="232" x2="450" y2="250" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="345" y="250" width="210" height="35" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="450" y="265" fill="#e2e8f0" font-size="11" text-anchor="middle">resolve_host_batch()</text>
  <text x="450" y="277" fill="#94a3b8" font-size="9" text-anchor="middle">ThreadPoolExecutor(50)</text>
  
  <line x1="450" y1="287" x2="450" y2="305" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="345" y="305" width="210" height="25" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="450" y="321" fill="#34d399" font-size="10" text-anchor="middle">Subdomain Set B</text>

  <!-- Phase 3 detailed -->
  <rect x="610" y="160" width="240" height="180" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="730" y="180" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle">Phase 3 Details</text>
  
  <rect x="625" y="195" width="210" height="35" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="730" y="210" fill="#e2e8f0" font-size="11" text-anchor="middle">port_scan_host()</text>
  <text x="730" y="222" fill="#94a3b8" font-size="9" text-anchor="middle">All resolved IPs</text>
  
  <line x1="730" y1="232" x2="730" y2="250" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="625" y="250" width="210" height="35" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="730" y="265" fill="#e2e8f0" font-size="11" text-anchor="middle">grab_banner()</text>
  <text x="730" y="277" fill="#94a3b8" font-size="9" text-anchor="middle">Service identification</text>
  
  <line x1="730" y1="287" x2="730" y2="305" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="625" y="305" width="210" height="25" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="730" y="321" fill="#fbbf24" font-size="10" text-anchor="middle">Open Ports + Banners</text>

  <!-- Merge flow -->
  <rect x="250" y="380" width="400" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="405" fill="#a78bfa" font-size="13" font-weight="bold" text-anchor="middle">Result Aggregation</text>
  
  <!-- Arrows from phases to merge -->
  <line x1="170" y1="330" x2="170" y2="360" stroke="#94a3b8" stroke-width="1"/>
  <line x1="170" y1="360" x2="350" y2="380" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="450" y1="330" x2="450" y2="380" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="730" y1="330" x2="730" y2="360" stroke="#94a3b8" stroke-width="1"/>
  <line x1="730" y1="360" x2="550" y2="380" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Output formats -->
  <line x1="450" y1="420" x2="450" y2="450" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow-gray)"/>
  
  <rect x="75" y="455" width="220" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="185" y="477" fill="#22d3ee" font-size="12" font-weight="bold" text-anchor="middle">Terminal Output</text>
  <text x="185" y="495" fill="#94a3b8" font-size="10" text-anchor="middle">Pretty-print results, summary stats</text>

  <rect x="340" y="455" width="220" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="477" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">CSV Export</text>
  <text x="450" y="495" fill="#94a3b8" font-size="10" text-anchor="middle">subdomains.csv · ports.csv</text>

  <rect x="605" y="455" width="220" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="715" y="477" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">JSON Export</text>
  <text x="715" y="495" fill="#94a3b8" font-size="10" text-anchor="middle">summary.json</text>

  <!-- Legend -->
  <rect x="280" y="540" width="340" height="130" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="560" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">Legend</text>
  <rect x="300" y="575" width="60" height="18" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="370" y="589" fill="#94a3b8" font-size="10">Passive Recon</text>
  <rect x="300" y="598" width="60" height="18" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="370" y="612" fill="#94a3b8" font-size="10">Active Recon</text>
  <rect x="300" y="621" width="60" height="18" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="370" y="635" fill="#94a3b8" font-size="10">Enumeration</text>
  <rect x="550" y="575" width="60" height="18" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="620" y="589" fill="#94a3b8" font-size="10">Aggregation</text>
  
  <line x1="550" y1="598" x2="610" y2="598" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="603" fill="#94a3b8" font-size="10">Data Flow</text>

  <!-- Footer -->
  <text x="450" y="690" fill="#475569" font-size="9" text-anchor="middle">ReconProbe v1.1 — Sideways 8 Security Research</text>
</svg>
